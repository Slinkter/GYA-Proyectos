version: '3.8'
services:
  db:
    image: postgres:16
    container_name: gya-db
    restart: always
    environment:
      POSTGRES_USER: gya_user
      POSTGRES_PASSWORD: gya_password
      POSTGRES_DB: gya_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
